name: Kara
options:
  bundleIdPrefix: com.kara
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
schemes:
  Kara:
    build:
      targets:
        Kara: all
packages:
  WChatClawSwift:
    url: https://github.com/section9-lab/wchat-claw-swfit.git
    branch: main
targets:
  Kara:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Kara
    dependencies:
      - package: WChatClawSwift
        product: WChatClawSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kara.Kara
        PRODUCT_NAME: Kara
        INFOPLIST_FILE: Kara/Supporting/Info.plist
        CODE_SIGN_ENTITLEMENTS: Kara/Supporting/Kara.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        LSUIElement: YES
