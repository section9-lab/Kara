name: LiveNote
options:
  bundleIdPrefix: com.livenote
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
schemes:
  LiveNote:
    build:
      targets:
        LiveNote: all
packages:
  WChatClawSwift:
    url: https://github.com/section9-lab/wchat-claw-swfit.git
    branch: main
targets:
  LiveNote:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: LiveNote
    dependencies:
      - package: WChatClawSwift
        product: WChatClawSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livenote.LiveNote
        PRODUCT_NAME: LiveNote
        INFOPLIST_FILE: LiveNote/Supporting/Info.plist
        CODE_SIGN_ENTITLEMENTS: LiveNote/Supporting/LiveNote.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        LSUIElement: YES
