name: Release DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-dmg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish DMG
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Configure private package access
        env:
          GIT_AUTH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
        run: |
          git config --global url."https://x-access-token:${GIT_AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build DMG
        id: package
        run: |
          chmod +x Scripts/package_dmg.sh
          dmg_output="$(mktemp)"
          DMG_PATH_OUTPUT="$dmg_output" Scripts/package_dmg.sh
          dmg_path="$(cat "$dmg_output")"
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Kara/Supporting/Info.plist)"
          short_sha="${GITHUB_SHA::7}"

          test -f "$dmg_path"

          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "tag=v$version-$short_sha" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.package.outputs.tag }}
          VERSION: ${{ steps.package.outputs.version }}
          SHORT_SHA: ${{ steps.package.outputs.short_sha }}
          DMG_PATH: ${{ steps.package.outputs.dmg_path }}
        run: |
          title="Kara $VERSION ($SHORT_SHA)"
          notes="Automated DMG release for commit $GITHUB_SHA on main."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_PATH" --clobber
          else
            gh release create "$TAG" "$DMG_PATH" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes"
          fi
